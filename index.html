<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chess Club – Đăng nhập</title>
    <link rel="stylesheet" href="theme.css" />
    <link rel="stylesheet" href="login.css" />
</head>

<body>
    <div class="auth-wrap">
        <div class="auth-box">
            <div class="auth-logo">♔</div>
            <h1 class="auth-title">Chess Club</h1>
            <p class="auth-sub">Nơi hội tụ của những kỳ thủ</p>

            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('login',this)">Đăng nhập</button>
                <button class="auth-tab" onclick="switchTab('register',this)">Đăng ký</button>
            </div>

            <!-- LOGIN -->
            <div id="pane-login" class="auth-pane active">
                <div class="field">
                    <label>Tên đăng nhập</label>
                    <input id="l-user" type="text" placeholder="username" />
                </div>
                <div class="field">
                    <label>Mật khẩu</label>
                    <input id="l-pw" type="password" placeholder="••••••••"
                        onkeydown="if(event.key==='Enter')doLogin()" />
                </div>
                <div class="auth-row">
                    <label class="auth-check"><input type="checkbox" /> Ghi nhớ</label>
                    <a href="#" class="auth-link">Quên mật khẩu?</a>
                </div>
                <div class="auth-msg" id="l-msg"></div>
                <button class="btn btn-primary btn-full" onclick="doLogin()">Đăng nhập</button>
            </div>

            <!-- REGISTER -->
            <div id="pane-register" class="auth-pane">
                <div class="field-row">
                    <div class="field">
                        <label>Họ và tên</label>
                        <input id="r-name" type="text" placeholder="Nguyễn Văn A" />
                    </div>
                    <div class="field">
                        <label>Tên đăng nhập</label>
                        <input id="r-user" type="text" placeholder="chessmaster" />
                    </div>
                </div>
                <div class="field">
                    <label>Email</label>
                    <input id="r-email" type="email" placeholder="you@email.com" />
                </div>
                <div class="field">
                    <label>Mật khẩu</label>
                    <input id="r-pw" type="password" placeholder="••••••••" />
                </div>
                <div class="field">
                    <label>Xác nhận mật khẩu</label>
                    <input id="r-pw2" type="password" placeholder="••••••••"
                        onkeydown="if(event.key==='Enter')doRegister()" />
                </div>
                <div class="auth-msg" id="r-msg"></div>
                <button class="btn btn-primary btn-full" onclick="doRegister()">Tạo tài khoản</button>
            </div>
        </div>
    </div>

    <script src="core.js"></script>
    <script>
        // Redirect if already logged in
        if (DB.getSession() && DB.getUser(DB.getSession())) {
            window.location.href = 'lobby.html';
        }

        function switchTab(name, el) {
            document.querySelectorAll('.auth-pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('pane-' + name).classList.add('active');
            el.classList.add('active');
        }

        function setMsg(id, msg, ok) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.className = 'auth-msg ' + (ok ? 'ok' : 'err');
        }

        function doLogin() {
            const u = document.getElementById('l-user').value.trim();
            const p = document.getElementById('l-pw').value;
            if (!u || !p) return setMsg('l-msg', 'Vui lòng điền đầy đủ thông tin', false);
            const res = DB.login(u, p);
            if (!res.ok) return setMsg('l-msg', res.msg, false);
            DB.setSession(res.user.username);
            setMsg('l-msg', '✓ Đăng nhập thành công!', true);
            setTimeout(() => window.location.href = 'lobby.html', 600);
        }

        function doRegister() {
            const name = document.getElementById('r-name').value.trim();
            const user = document.getElementById('r-user').value.trim();
            const email = document.getElementById('r-email').value.trim();
            const pw = document.getElementById('r-pw').value;
            const pw2 = document.getElementById('r-pw2').value;
            if (!name || !user || !email || !pw) return setMsg('r-msg', 'Vui lòng điền đầy đủ thông tin', false);
            if (pw !== pw2) return setMsg('r-msg', 'Mật khẩu không khớp', false);
            if (pw.length < 6) return setMsg('r-msg', 'Mật khẩu tối thiểu 6 ký tự', false);
            if (!/^[a-zA-Z0-9_]{3,20}$/.test(user)) return setMsg('r-msg', 'Tên đăng nhập chỉ gồm chữ, số, _ (3-20 ký tự)', false);
            const res = DB.register(user, email, pw, name);
            if (!res.ok) return setMsg('r-msg', res.msg, false);
            DB.setSession(user);
            setMsg('r-msg', '✓ Tạo tài khoản thành công!', true);
            setTimeout(() => window.location.href = 'lobby.html', 600);
        }
    </script>
</body>

</html>
