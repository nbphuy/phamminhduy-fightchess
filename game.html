<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess Club – Chơi</title>
  <link rel="stylesheet" href="./theme.css" />
  <link rel="stylesheet" href="./game.css" />
</head>

<body>
  <nav class="navbar">
    <div class="brand">♔ Chess<span>Club</span></div>
    <div class="nav-center" id="gameStatus">Đang chuẩn bị…</div>
    <div class="nav-user">
      <span class="nav-coin" id="navCoin">🪙 0</span>
      <span class="nav-elo" id="navElo">ELO 500</span>
      <div class="nav-avatar" id="navAv">??</div>
      <span class="nav-name" id="navName">…</span>
    </div>
  </nav>

  <main class="game-main">
    <!-- OPPONENT -->
    <div class="player-bar" id="oppBar">
      <div class="pbar-info">
        <div class="pbar-av" id="oppAv">??</div>
        <div>
          <div class="pbar-name" id="oppName">Đối thủ <span class="color-dot dark"></span></div>
          <div class="pbar-elo" id="oppElo">ELO —</div>
        </div>
      </div>
      <div class="captured" id="capByWhite"></div>
      <div class="clock" id="clockBlack">05:00</div>
    </div>

    <div class="board" id="board"></div>

    <!-- SELF -->
    <div class="player-bar" id="meBar">
      <div class="pbar-info">
        <div class="pbar-av me-av" id="meAv">??</div>
        <div>
          <div class="pbar-name" id="meName">Bạn <span class="color-dot light"></span></div>
          <div class="pbar-elo" id="meElo">ELO —</div>
        </div>
      </div>
      <div class="captured" id="capByBlack"></div>
      <div class="clock active" id="clockWhite">05:00</div>
    </div>
  </main>

  <aside class="game-side">
    <div class="side-card">
      <div class="side-label">Lịch sử nước đi</div>
      <div class="move-list" id="moveList"><span class="move-empty">Chưa có nước đi</span></div>
    </div>
    <div class="side-card chat-card">
      <div class="side-label">Chat</div>
      <div class="chat-msgs" id="chatMsgs">
        <div class="chat-sys">Trận đấu bắt đầu. Chúc may mắn! ♟</div>
      </div>
      <div class="chat-row">
        <input type="text" id="chatIn" placeholder="Nhắn tin…" onkeydown="if(event.key==='Enter')sendChat()" />
        <button onclick="sendChat()">Gửi</button>
      </div>
    </div>
    <div class="game-actions">
      <button class="btn btn-secondary" onclick="offerDraw()">🤝 Cầu hoà</button>
      <button class="btn btn-danger" onclick="resign()">🏳 Đầu hàng</button>
    </div>
  </aside>

  <!-- PROMOTION -->
  <div class="overlay" id="promoOverlay">
    <div class="modal">
      <div class="modal-title">Phong cấp — chọn quân</div>
      <div class="promo-opts" id="promoOpts"></div>
    </div>
  </div>

  <!-- RESULT -->
  <div class="overlay" id="resultOverlay">
    <div class="modal">
      <div class="result-icon" id="resIcon">♔</div>
      <div class="modal-title" id="resTitle">Kết quả</div>
      <div class="result-sub" id="resSub"></div>
      <div class="result-elo" id="resElo"></div>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:20px">
        <button class="btn btn-primary" onclick="window.location.href='./lobby.html'">Về Lobby</button>
        <button class="btn btn-secondary" onclick="location.reload()">Chơi lại</button>
      </div>
    </div>
  </div>

  <script src="./core.js"></script>
  <script src="./game.js"></script>
</body>

</html>
