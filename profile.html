<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chess Club – Hồ sơ</title>
  <link rel="stylesheet" href="theme.css"/>
  <link rel="stylesheet" href="profile.css"/>
</head>
<body>
  <nav class="navbar">
    <div class="brand">♔ Chess<span>Club</span></div>
    <div class="nav-links">
      <a href="lobby.html">Lobby</a>
      <a href="live.html">🔴 Live</a>
      <a href="leaderboard.html">Bảng xếp hạng</a>
      <a href="profile.html" class="active">Hồ sơ</a>
    </div>
    <div class="nav-user">
      <span class="nav-coin" id="navCoin">🪙 0</span>
      <span class="nav-elo" id="navElo">ELO 500</span>
      <div class="nav-avatar" id="navAv">??</div>
      <span class="nav-name" id="navName">…</span>
      <a href="login.html" class="nav-logout" onclick="DB.clearSession()">Thoát</a>
    </div>
  </nav>

  <main class="prof-main">

    <!-- LEFT -->
    <aside class="prof-left">
      <div class="card prof-card">
        <div class="prof-avatar" id="profAv">??</div>
        <div class="prof-username" id="profUsername"></div>
        <div class="prof-join" id="profJoin"></div>
        <div class="prof-elo-badge" id="profEloBadge"></div>
      </div>
      <div class="card">
        <div class="side-title">📊 Thống kê</div>
        <div class="stat-list" id="statList"></div>
        <div class="wld-bar" id="wldBar"></div>
        <div class="wld-legend">
          <span class="wld-dot g"></span>Thắng
          <span class="wld-dot y"></span>Hoà
          <span class="wld-dot r"></span>Thua
        </div>
      </div>
    </aside>

    <!-- RIGHT -->
    <div class="prof-right">
      <div class="p-tabs">
        <button class="p-tab active" onclick="switchTab('info',this)">Thông tin</button>
        <button class="p-tab" onclick="switchTab('history',this)">Lịch sử trận</button>
        <button class="p-tab" onclick="switchTab('settings',this)">Cài đặt</button>
      </div>

      <!-- INFO -->
      <div id="ptab-info" class="ptab-content card active">
        <div class="ptab-title">Thông tin cá nhân</div>
        <div class="info-grid" id="infoGrid"></div>
      </div>

      <!-- HISTORY -->
      <div id="ptab-history" class="ptab-content card">
        <div class="ptab-title">Lịch sử trận đấu gần đây</div>
        <table class="g-table">
          <thead><tr>
            <th>Kết quả</th><th>Đối thủ</th><th>ELO ĐT</th>
            <th>Thời gian</th><th>Thay đổi ELO</th><th>Ngày</th>
          </tr></thead>
          <tbody id="histBody"></tbody>
        </table>
      </div>

      <!-- SETTINGS -->
      <div id="ptab-settings" class="ptab-content card">
        <div class="ptab-title">Chỉnh sửa thông tin</div>
        <div class="settings-grid">
          <div class="field">
            <label>Họ và tên</label>
            <input id="s-name" type="text"/>
          </div>
          <div class="field">
            <label>Email</label>
            <input id="s-email" type="email"/>
          </div>
          <div class="field">
            <label>Quốc gia</label>
            <select id="s-country">
              <option>Việt Nam</option>
              <option>Hoa Kỳ</option>
              <option>Nhật Bản</option>
              <option>Hàn Quốc</option>
              <option>Khác</option>
            </select>
          </div>
          <div class="field full">
            <label>Giới thiệu</label>
            <textarea id="s-bio" rows="3"></textarea>
          </div>
        </div>

        <div class="ptab-title" style="margin-top:24px">Đổi mật khẩu</div>
        <div class="settings-grid">
          <div class="field">
            <label>Mật khẩu hiện tại</label>
            <input id="s-pwold" type="password" placeholder="••••••••"/>
          </div>
          <div class="field">
            <label>Mật khẩu mới</label>
            <input id="s-pwnew" type="password" placeholder="••••••••"/>
          </div>
        </div>

        <div class="save-row">
          <button class="btn btn-primary" onclick="saveSettings()">Lưu thay đổi</button>
          <span class="save-msg" id="saveMsg"></span>
        </div>
      </div>
    </div>
  </main>

  <script src="core.js"></script>
  <script src="profile.js"></script>
</body>
</html>
