<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chess Club – Lobby</title>
  <link rel="stylesheet" href="./theme.css" />
  <link rel="stylesheet" href="./lobby.css" />
</head>

<body>
  <nav class="navbar">
    <div class="brand">♔ Chess<span>Club</span></div>
    <div class="nav-links">
      <a href="./lobby.html" class="active">Lobby</a>
      <a href="./live.html">🔴 Live</a>
      <a href="./leaderboard.html">Bảng xếp hạng</a>
      <a href="./profile.html">Hồ sơ</a>
    </div>
    <div class="nav-user">
      <span class="nav-coin" id="navCoin">🪙 0</span>
      <span class="nav-elo" id="navElo">ELO 500</span>
      <div class="nav-avatar" id="navAv">??</div>
      <span class="nav-name" id="navName">Loading…</span>
      <a href="./index.html" class="nav-logout" onclick="DB.clearSession()">Thoát</a>
    </div>
  </nav>

  <main class="lobby-main">
    <aside class="lobby-side">

      <div class="card">
        <div class="side-title">⚡ Chơi nhanh</div>
        <div class="time-grid" id="timeGrid">
          <button class="time-btn active" data-min="1">1 phút</button>
          <button class="time-btn" data-min="3">3 phút</button>
          <button class="time-btn" data-min="5">5 phút</button>
          <button class="time-btn" data-min="10">10 phút</button>
          <button class="time-btn" data-min="15">15 phút</button>
          <button class="time-btn" data-min="30">30 phút</button>
        </div>
        <button class="btn btn-primary btn-full" onclick="openFindModal()">Tìm trận</button>
      </div>

      <div class="card">
        <div class="side-title">🏠 Tạo phòng</div>
        <div class="field">
          <label>Tên phòng</label>
          <input id="rName" type="text" placeholder="Phòng của tôi" />
        </div>
        <div class="field">
          <label>Thời gian</label>
          <select id="rTime">
            <option value="5">5 phút</option>
            <option value="10">10 phút</option>
            <option value="15">15 phút</option>
            <option value="30">30 phút</option>
          </select>
        </div>
        <div class="field">
          <label>Mật khẩu (tuỳ chọn)</label>
          <input id="rPw" type="password" placeholder="Để trống = public" />
        </div>
        <button class="btn btn-secondary btn-full" onclick="createRoom()">Tạo phòng</button>
      </div>

    </aside>

    <section class="lobby-content">
      <div class="room-header">
        <h2>Danh sách phòng <span class="badge badge-gray" id="roomCount">0 phòng</span></h2>
        <input type="text" class="room-search" placeholder="🔍 Tìm phòng…" oninput="filterRooms(this.value)" />
      </div>
      <div class="card" style="padding:0;overflow:hidden">
        <table class="g-table">
          <thead>
            <tr>
              <th>Tên phòng</th>
              <th>Chủ phòng</th>
              <th>ELO chủ</th>
              <th>Thời gian</th>
              <th>Trạng thái</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="roomBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <!-- Find game modal -->
  <div class="overlay" id="findOverlay">
    <div class="modal">
      <div class="find-spinner">♟</div>
      <div class="modal-title">Đang tìm đối thủ…</div>
      <div class="find-sub" id="findTimer">0 giây</div>
      <button class="btn btn-secondary" onclick="cancelFind()">Huỷ</button>
    </div>
  </div>

  <!-- Room password modal -->
  <div class="overlay" id="pwOverlay">
    <div class="modal">
      <div class="modal-title">🔒 Phòng có mật khẩu</div>
      <div class="field" style="text-align:left;margin-bottom:16px">
        <label>Nhập mật khẩu</label>
        <input id="joinPwInput" type="password" placeholder="••••••••"
          onkeydown="if(event.key==='Enter')confirmJoin()" />
      </div>
      <div class="auth-msg err" id="pwMsg" style="margin-bottom:12px"></div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary" style="flex:1" onclick="closePwModal()">Huỷ</button>
        <button class="btn btn-primary" style="flex:1" onclick="confirmJoin()">Vào</button>
      </div>
    </div>
  </div>

  <script src="./core.js"></script>
  <script src="./lobby.js"></script>
</body>

</html>
